# ==============================================================
# Jellyfin Media Server - Debian 12 Preseed
# Zona horaria: Venezuela (America/Caracas)
# Particionado: Automático disco completo
# ==============================================================

### Localización
d-i debian-installer/locale string es_VE.UTF-8
d-i localechooser/supported-locales multiselect es_VE.UTF-8, en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select latam
d-i keyboard-configuration/layoutcode string latam

### Red
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string mediaserver
d-i netcfg/get_domain string local

# Configuración WiFi - WPA2
d-i netcfg/wireless_essid        string Umbrella
d-i netcfg/wireless_essid_again  string Umbrella
d-i netcfg/wireless_security_type select wpa
d-i netcfg/wireless_wpa          string Umbrella.123
d-i netcfg/wireless_wep          string

### Repositorio
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i mirror/suite string bookworm

### Reloj y zona horaria
d-i clock-setup/utc boolean false
d-i time/zone string America/Caracas

### Particionado automático (disco completo)
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-auto/disk string /dev/sda
d-i partman/default_filesystem string ext4
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Sistema base
d-i base-installer/install-recommends boolean true
d-i base-installer/kernel/image string linux-image-amd64

### Usuario (sin root)
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Admin Jellyfin
d-i passwd/username string mediaserver
d-i passwd/user-password password jellyfin123
d-i passwd/user-password-again password jellyfin123
d-i passwd/user-default-groups string audio cdrom video sudo

### APT - habilitar non-free y firmware
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true
d-i apt-setup/services-select multiselect security, updates
d-i apt-setup/security_host string security.debian.org

### Paquetes a instalar
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string \
    curl wget gnupg apt-transport-https ca-certificates \
    firmware-linux firmware-linux-nonfree \
    firmware-iwlwifi firmware-realtek firmware-atheros \
    firmware-brcm80211 firmware-ralink firmware-mediatek \
    wireless-tools wpasupplicant network-manager \
    ufw net-tools htop sudo \
    avahi-daemon avahi-utils

d-i pkgsel/upgrade select full-upgrade
d-i pkgsel/update-policy select unattended-upgrades

### Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean true
d-i grub-installer/bootdev string default

### Comando post-instalación: ejecutar script de Jellyfin
d-i preseed/late_command string \
    cp /jellyfin-setup.sh /target/tmp/jellyfin-setup.sh ; \
    chmod +x /target/tmp/jellyfin-setup.sh ; \
    in-target bash /tmp/jellyfin-setup.sh 2>&1 | tee /target/var/log/jellyfin-setup.log

### Reiniciar al terminar
d-i finish-install/reboot_in_progress note
