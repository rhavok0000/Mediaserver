name: Construir ISO Jellyfin Mediaserver

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar dependencias
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xorriso isolinux wget cpio gzip

      - name: Dar permisos al script
        run: chmod +x build.sh

      - name: Construir ISO
        env:
          WIFI_SSID: ${{ secrets.WIFI_SSID }}
          WIFI_PASSWORD: ${{ secrets.WIFI_PASSWORD }}
          WIFI_SECURITY: ${{ secrets.WIFI_SECURITY }}
        run: ./build.sh

      - name: Subir ISO como artefacto descargable
        uses: actions/upload-artifact@v4
        with:
          name: jellyfin-mediaserver-iso
          path: jellyfin-mediaserver.iso
          retention-days: 30
